<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>codesync dashboard</title>
<style>
  :root{
    --bg:#07080f; --card:rgba(255,255,255,.035); --card-hi:rgba(255,255,255,.06);
    --border:rgba(255,255,255,.10); --text:#eceeff; --dim:#aeb4ce; --muted:#7c83a0; --faint:#5b5f72;
    --accent:#8b7cff; --accent-ink:#cfc7ff; --accent-bg:rgba(139,124,255,.14);
    --cyan:#34e0ff; --ok:#46c97f; --warn:#f5b455; --bad:#ff6b6b;
    --grad:linear-gradient(120deg,#6366f1,#b06bff,#34e0ff);
    --mono:"JetBrains Mono",ui-monospace,"SF Mono",Menlo,Consolas,monospace;
    --sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--text);font:15px/1.55 var(--sans);
    -webkit-font-smoothing:antialiased;padding-bottom:60px}
  body::before{content:"";position:fixed;inset:0;z-index:-1;pointer-events:none;
    background:radial-gradient(50vw 40vw at 15% 0%,rgba(99,102,241,.16),transparent 60%),
      radial-gradient(45vw 40vw at 90% 8%,rgba(176,107,255,.12),transparent 60%)}
  .wrap{max-width:920px;margin:0 auto;padding:0 22px}
  .mono{font-family:var(--mono)}

  /* ── glance bar ── */
  header{position:sticky;top:0;z-index:6;backdrop-filter:blur(12px);
    background:rgba(7,8,15,.74);border-bottom:1px solid var(--border)}
  .glance{display:flex;align-items:center;gap:16px;padding:13px 0;flex-wrap:wrap}
  .brand{display:flex;align-items:center;gap:9px;font-weight:800;font-size:18px;letter-spacing:-.02em}
  .brand .glyph{width:27px;height:27px;border-radius:8px;background:var(--grad);display:grid;place-items:center;color:#fff;font-weight:800;font-size:14px}
  .proj{display:flex;align-items:center;gap:6px;padding:5px 11px;border:1px solid var(--border);
    border-radius:9px;background:var(--card);font-weight:650;cursor:pointer}
  .proj:hover{border-color:var(--accent)}
  .proj .chev{color:var(--faint);font-size:12px}
  .stat{display:flex;align-items:center;gap:7px;font-size:13.5px;color:var(--muted)}
  .stat b{font-weight:700}
  .stat.need b{color:var(--accent-ink)} .stat.work b{color:var(--text)}
  .dot{width:9px;height:9px;border-radius:50%;background:var(--muted)}
  .dot.ok{background:var(--ok);box-shadow:0 0 0 3px rgba(70,201,127,.16)}
  .dot.warn{background:var(--warn);box-shadow:0 0 0 3px rgba(245,180,85,.16)}
  .dot.bad{background:var(--bad);box-shadow:0 0 0 3px rgba(255,107,107,.16)}
  .spacer{margin-left:auto}
  .who{color:var(--faint);font-size:12px}

  .zone{margin-top:26px}
  .zlabel{font-size:11.5px;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);
    font-weight:700;margin:0 0 12px 2px;display:flex;align-items:center;gap:9px}
  .zlabel .n{background:var(--accent-bg);color:var(--accent-ink);border-radius:20px;padding:1px 9px;font-size:11px;letter-spacing:.04em}
  .empty{color:var(--muted);font-size:13.5px;padding:4px 2px}

  /* projects list */
  .prow{display:flex;align-items:center;gap:12px;padding:14px;margin:10px 0;border:1px solid var(--border);
    border-radius:13px;background:var(--card);cursor:pointer;transition:.18s}
  .prow:hover{transform:translateX(3px);border-color:var(--accent);background:var(--accent-bg)}
  .prow .pname{font-weight:800;font-size:16px}
  .prow .ppath{font-size:11.5px;color:var(--muted);font-family:var(--mono);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .prow .pmeta{margin-left:auto;display:flex;align-items:center;gap:8px;flex-shrink:0}
  .prow .chev{color:var(--muted);font-size:18px}
  .tag{font-size:10.5px;font-weight:800;text-transform:uppercase;letter-spacing:.04em;padding:3px 8px;border-radius:999px;background:rgba(255,255,255,.08);color:var(--dim);white-space:nowrap}
  .tag.warn{background:rgba(245,180,85,.16);color:var(--warn)}

  /* NEEDS YOU — loud decision cards */
  .decision{background:var(--card-hi);border:1px solid var(--border);border-left:3px solid var(--accent);
    border-radius:14px;padding:15px 17px;margin-bottom:11px;transition:.25s ease}
  .decision:hover{background:rgba(255,255,255,.075)}
  .decision.info{border-left-color:var(--muted);background:var(--card)}
  .decision.gone{opacity:0;transform:translateX(40px);max-height:0;padding:0;margin:0;border:0;overflow:hidden}
  .drow{display:flex;gap:13px;align-items:flex-start}
  .ic{flex:0 0 36px;height:36px;border-radius:10px;display:grid;place-items:center;font-size:17px;background:var(--accent-bg)}
  .ic.pair{background:rgba(70,201,127,.14)} .ic.reply{background:rgba(245,180,85,.14)} .ic.conflict{background:rgba(255,107,107,.14)}
  .dbody{flex:1;min-width:0}
  .dtitle{font-weight:650;font-size:15px}
  .dsub{color:var(--muted);font-size:13px;margin-top:3px;word-break:break-word}
  .did{font-family:var(--mono);font-size:11px;color:var(--faint);margin-top:5px;word-break:break-all}
  .chips{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px}
  .chip{font-size:11.5px;padding:3px 9px;border-radius:7px;border:1px solid var(--border);color:var(--muted);background:rgba(255,255,255,.02)}
  .chip.ok{color:var(--ok);border-color:rgba(70,201,127,.3)}
  .chip.warn{color:var(--warn);border-color:rgba(245,180,85,.32)}
  .actions{display:flex;gap:9px;align-items:center;margin-top:13px}
  .grow{flex:1}
  .hint{font-size:12px;color:var(--faint)}
  .link{color:var(--accent-ink);font-size:13px;cursor:pointer;border:0;background:none;padding:6px 0;font-family:inherit}
  .link:hover{text-decoration:underline}
  .btn{font:inherit;font-size:13.5px;font-weight:650;padding:8px 15px;border-radius:9px;cursor:pointer;
    border:1px solid var(--border);background:var(--card);color:var(--text);transition:.15s}
  .btn:hover{background:var(--card-hi)}
  .btn.primary{background:var(--accent);border-color:var(--accent);color:#15101f}
  .btn.primary:hover{filter:brightness(1.08)}
  .btn.primary[disabled]{opacity:.4;cursor:not-allowed;filter:none}
  .btn.ghostred:hover{border-color:rgba(255,107,107,.5);color:var(--bad);background:rgba(255,107,107,.08)}
  .badge{font-size:10.5px;font-weight:800;text-transform:uppercase;letter-spacing:.05em;padding:3px 8px;border-radius:999px;white-space:nowrap}
  .b-todo{background:var(--accent-bg);color:var(--accent-ink)} .b-wip{background:rgba(245,180,85,.16);color:var(--warn)}
  .b-blocked{background:rgba(255,107,107,.16);color:var(--bad)} .b-note{background:rgba(255,255,255,.08);color:var(--dim)}
  .b-done{background:rgba(70,201,127,.14);color:var(--ok)} .b-auto{background:rgba(52,224,255,.14);color:var(--cyan)}
  .diff{display:none;margin-top:11px;border:1px solid var(--border);border-radius:10px;overflow:hidden}
  .diff.open{display:block}
  .diff pre{margin:0;padding:12px 13px;font-family:var(--mono);font-size:12.5px;line-height:1.5;overflow:auto;max-height:340px;background:#0a0c16;color:#c8ccda;white-space:pre}

  .calm{text-align:center;padding:38px 20px;border:1px dashed var(--border);border-radius:16px;background:var(--card)}
  .calm .big{font-size:19px;font-weight:650} .calm .small{color:var(--muted);margin-top:7px}

  /* HAPPENING — one calm feed */
  .feed{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:4px 2px}
  .live{display:flex;align-items:center;gap:10px;padding:11px 14px;border-bottom:1px solid var(--border)}
  .pulse{width:8px;height:8px;border-radius:50%;background:var(--accent);animation:p 1.8s infinite}
  .pulse.idle{background:var(--faint);animation:none}
  @keyframes p{0%{box-shadow:0 0 0 0 rgba(139,124,255,.5)}70%{box-shadow:0 0 0 7px rgba(139,124,255,0)}100%{box-shadow:0 0 0 0 rgba(139,124,255,0)}}
  .ev{display:flex;gap:10px;align-items:baseline;padding:9px 14px;font-size:13.5px;color:var(--muted)}
  .ev .t{margin-left:auto;color:var(--faint);font-size:12px;white-space:nowrap}
  .ev b{color:var(--text);font-weight:600}
  .ev .gi{flex:0 0 18px}

  .dobar{display:flex;gap:10px;flex-wrap:wrap;margin-top:2px}
  .panel{margin-top:12px}
  .fin{display:block;width:100%;margin:6px 0;padding:8px 10px;border-radius:8px;border:1px solid var(--border);background:rgba(255,255,255,.04);color:var(--text);font:inherit}

  /* HEALTH — quiet, collapsed */
  .health{margin-top:26px;border-top:1px solid var(--border);padding-top:15px}
  .hsum{display:flex;align-items:center;gap:10px;color:var(--muted);font-size:13px;cursor:pointer}
  .hsum .chev{margin-left:auto;color:var(--faint);transition:.2s}
  .hsum.open .chev{transform:rotate(180deg)}
  .hbody{display:none;margin-top:14px} .hbody.open{display:block}
  .hgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:11px}
  .hcell{background:var(--card);border:1px solid var(--border);border-radius:11px;padding:13px}
  .hcell .k{font-size:11px;color:var(--faint);text-transform:uppercase;letter-spacing:.08em}
  .hcell .v{font-size:15px;margin-top:5px;font-weight:600}
  .agent{display:flex;align-items:center;gap:11px;padding:10px 0;border-top:1px solid rgba(255,255,255,.06)}
  .agent:first-of-type{border-top:0}
  .agent .av{width:28px;height:28px;border-radius:8px;display:grid;place-items:center;font-weight:800;font-size:12px;flex-shrink:0;background:var(--accent-bg);color:var(--accent-ink)}
  .agent.self .av{background:var(--grad);color:#fff}
  .agent .main{flex:1;min-width:0}.agent .nm{font-weight:650}.agent .sub{font-size:12px;color:var(--muted)}
  .pill{font-size:11px;font-weight:700;padding:2px 9px;border-radius:999px;white-space:nowrap}
  .pill.on{background:rgba(70,201,127,.14);color:var(--ok)} .pill.off{background:rgba(255,255,255,.07);color:var(--muted)}
  .pill.you{background:var(--accent-bg);color:var(--accent-ink)}
  .role{font-size:10.5px;font-weight:700;padding:2px 7px;border-radius:6px;background:rgba(255,255,255,.07);color:var(--dim);margin-left:5px}
  .role.active{background:rgba(70,201,127,.16);color:var(--ok)} .role.active::before{content:"● ";font-size:8px;vertical-align:middle}
  .err{color:var(--bad);font-size:12.5px;margin-top:6px}
  .hsub{font-size:11.5px;color:var(--faint);margin-top:10px}
  .foot{color:var(--faint);font-size:12px;text-align:center;margin-top:32px}
</style>
</head>
<body>

<header><div class="wrap glance">
  <div class="brand"><span class="glyph">⇄</span> codesync</div>
  <span id="g-projbtn" class="proj" style="display:none">—<span class="chev">▾</span></span>
  <div class="stat" id="g-sync" style="display:none"><span class="dot" id="g-dot"></span> <span id="g-synctext"></span></div>
  <div class="stat need" id="g-need" style="display:none">·&nbsp;&nbsp;<b></b></div>
  <div class="stat work" id="g-work" style="display:none">·&nbsp;&nbsp;<b></b></div>
  <div class="spacer"></div>
  <div class="who"><span id="g-identity"></span> · <span id="g-updated"></span></div>
</div></header>

<div class="wrap">

  <!-- LIST VIEW -->
  <section id="view-list" class="zone">
    <div class="zlabel">Your projects</div>
    <div id="projects"><div class="empty">…</div></div>
  </section>

  <!-- DETAIL VIEW -->
  <section id="view-detail" style="display:none">

    <section class="zone">
      <div class="zlabel">Needs your decision <span class="n" id="c-need" style="display:none"></span></div>
      <div id="needs"><div class="empty">…</div></div>
    </section>

    <section class="zone">
      <div class="zlabel">What's happening</div>
      <div class="feed" id="happening"><div class="empty" style="padding:12px 14px">…</div></div>
    </section>

    <section class="zone">
      <div class="zlabel">Start something</div>
      <div id="do"><div class="dobar"><span class="empty">…</span></div></div>
    </section>

    <section class="health">
      <div class="hsum" id="health-sum"><span class="dot" id="h-dot"></span> <span id="h-line">…</span><span class="chev">▾</span></div>
      <div class="hbody" id="health-body"></div>
    </section>
  </section>

  <div class="foot">read-only · localhost · auto-refreshes every 4s · close the tab or run <span class="mono">/codesync-dashboard --stop</span> to end</div>
</div>

<script>
"use strict";
const TOKEN=new URLSearchParams(location.search).get("t")||"";
let VIEW="list", CURRENT="", OVERVIEW={projects:[]}, LIVE_ROLES=new Set();
let HEALTH_OPEN=false;
const VIEWED=new Set();                 // review ids whose diff has been opened (approve-lock)
// caches so each zone re-renders from the latest of every source without flicker
const NY={pending:[],reviews:[],waiting:[],conflicts:[]};
const HAP={sessions:[],feed:[]};
const HLT={peers:null,folder:null,autopilot:null,metrics:null,sync_ok:null};

function api(p){return fetch(p,{headers:{"X-CSDash-Token":TOKEN}}).then(r=>{if(!r.ok)throw new Error(r.status);return r.json();});}
function post(p,b){return fetch(p,{method:"POST",headers:{"X-CSDash-Token":TOKEN,"Content-Type":"application/json"},
  body:JSON.stringify(b)}).then(r=>r.json().then(j=>({status:r.status,body:j})).catch(()=>({status:r.status,body:{}})));}
function el(t,a,k){const n=document.createElement(t);if(a)for(const x in a){
  if(x==="text")n.textContent=a[x];else if(x==="class")n.className=a[x];else n.setAttribute(x,a[x]);}
  (k||[]).forEach(c=>c&&n.appendChild(c));return n;}
function clear(n){while(n.firstChild)n.removeChild(n.firstChild);}
function fmtSecs(s){if(s==null)return"—";s=Math.round(s);if(s<60)return s+"s";if(s<3600)return Math.round(s/60)+"m";if(s<86400)return Math.round(s/3600)+"h";return Math.round(s/86400)+"d";}
function initials(n){const w=(n||"").replace(/[^A-Za-z0-9 ]/g,"").trim().split(/\s+|-/);return ((w[0]||"?")[0]+((w[1]||"")[0]||"")).toUpperCase();}
function plainStatus(s){return {todo:"to do",wip:"in progress",blocked:"blocked",note:"note",done:"done"}[s]||s||"note";}
function projRoles(n){const p=(OVERVIEW.projects||[]).find(x=>x.name===n);return p?p.roles:[];}

// ── view switching ──
function showList(){VIEW="list";CURRENT="";
  document.getElementById("view-list").style.display="";
  document.getElementById("view-detail").style.display="none";
  ["g-projbtn","g-sync","g-need","g-work"].forEach(id=>document.getElementById(id).style.display="none");
  refresh();}
function showDetail(n){VIEW="detail";CURRENT=n;HEALTH_OPEN=false;VIEWED.clear();
  NY.pending=[];NY.reviews=[];NY.waiting=[];NY.conflicts=[];HAP.sessions=[];HAP.feed=[];
  document.getElementById("view-list").style.display="none";
  document.getElementById("view-detail").style.display="";
  document.getElementById("g-projbtn").style.display="";
  document.getElementById("g-projbtn").firstChild.nodeValue=n;
  document.getElementById("health-body").classList.remove("open");
  document.getElementById("health-sum").classList.remove("open");
  ["needs","happening","do"].forEach(id=>{const b=document.getElementById(id);clear(b);b.appendChild(el("div",{class:"empty",text:"…"}));});
  _nySig=null;document.getElementById("needs").dataset.built="";   // force a fresh build for the new project
  _launchFor="";
  refresh();}
document.getElementById("g-projbtn").addEventListener("click",showList);
document.getElementById("health-sum").addEventListener("click",()=>{
  HEALTH_OPEN=!HEALTH_OPEN;
  document.getElementById("health-body").classList.toggle("open",HEALTH_OPEN);
  document.getElementById("health-sum").classList.toggle("open",HEALTH_OPEN);});

// ── glance bar ──
function renderGlance(){
  document.getElementById("g-identity").textContent=OVERVIEW.identity?("signed in as "+OVERVIEW.identity):"";
  document.getElementById("g-updated").textContent="updated "+new Date().toLocaleTimeString();
  if(VIEW!=="detail")return;
  // sync dot
  const dot=document.getElementById("g-dot"),txt=document.getElementById("g-synctext"),sync=document.getElementById("g-sync");
  sync.style.display="";
  const f=HLT.folder||{};
  if(HLT.sync_ok===false){dot.className="dot bad";txt.textContent="Syncthing offline";}
  else if(HLT.sync_ok==null){dot.className="dot";txt.textContent="checking sync…";}
  else if((f.need_files||0)>0){dot.className="dot warn";txt.textContent=f.need_files+" file"+(f.need_files===1?"":"s")+" syncing";}
  else if((HLT.peers||[]).some(p=>!p.connected)){dot.className="dot warn";txt.textContent="a peer is offline";}
  else if((HLT.peers||[]).length===0){dot.className="dot ok";txt.textContent="no peers yet";}
  else{dot.className="dot ok";txt.textContent="everyone in sync";}
  // need-you count
  const need=NY.pending.length+NY.reviews.length+NY.waiting.length+NY.conflicts.length;
  const ng=document.getElementById("g-need");ng.style.display=need?"":"none";ng.querySelector("b").textContent=need+" need"+(need===1?"s":"")+" you";
  // agents working
  const wg=document.getElementById("g-work");wg.style.display="";
  const w=HAP.sessions.length;wg.querySelector("b").textContent=w?(w+" agent"+(w===1?"":"s")+" working"):"agents idle";
}

// ── projects list ──
function renderProjects(o){
  const box=document.getElementById("projects");clear(box);
  if(!o.projects.length){box.appendChild(el("div",{class:"empty",text:"No projects on this machine yet. Run /install-codesync."}));return;}
  o.projects.forEach(p=>{
    const row=el("div",{class:"prow"},[
      el("div",{class:"main",style:"min-width:0"},[el("div",{class:"pname",text:p.name}),el("div",{class:"ppath",text:p.path||""})]),
      el("div",{class:"pmeta"},[
        el("span",{class:"tag",text:(p.roles.length||0)+" role"+(p.roles.length===1?"":"s")}),
        p.exists?null:el("span",{class:"tag warn",text:"missing folder"}),
        el("span",{class:"chev",text:"›"})]),
    ]);
    row.addEventListener("click",()=>showDetail(p.name));box.appendChild(row);
  });
}

// ── NEEDS YOU (unified queue) ──
function diffChips(r){
  const out=[];
  const m=/(\d+)\s+file/.exec(r.diffstat||"");if(m)out.push({t:m[1]+" file"+(m[1]==="1"?"":"s"),c:"ok"});
  const ins=/(\d+)\s+insertion/.exec(r.diffstat||"");const del=/(\d+)\s+deletion/.exec(r.diffstat||"");
  if(ins)out.push({t:"+"+ins[1],c:"ok"});if(del)out.push({t:"-"+del[1],c:"ok"});
  if(r.status==="blocked")out.push({t:"⚠ secret: "+((r.secrets||[]).join(", ")||"flagged"),c:"warn"});
  return out;
}
function reviewCard(r){
  const blocked=r.status==="blocked";
  const d=el("div",{class:"decision",id:"need-rev-"+r.id});
  const chips=el("div",{class:"chips"});diffChips(r).forEach(c=>chips.appendChild(el("span",{class:"chip "+(c.c||""),text:c.t})));
  const diffBox=el("pre");const diffWrap=el("div",{class:"diff"});diffWrap.appendChild(diffBox);
  const okBtn=el("button",{class:"btn primary",text:"Approve ▸"});
  const hint=el("span",{class:"hint",text:"view the diff to approve"});
  if(!VIEWED.has(r.id)&&!blocked)okBtn.disabled=true;
  const viewLink=el("button",{class:"link",text:"view diff ▾"});
  viewLink.addEventListener("click",()=>{
    if(diffWrap.classList.contains("open")){diffWrap.classList.remove("open");return;}
    diffWrap.classList.add("open");diffBox.textContent="loading…";
    VIEWED.add(r.id);if(!blocked){okBtn.disabled=false;hint.style.display="none";}
    api("/api/review-diff?project="+encodeURIComponent(CURRENT)+"&id="+encodeURIComponent(r.id))
      .then(x=>{diffBox.textContent=(x.diff&&x.diff.trim())?x.diff:(x.error||"(no diff)");})
      .catch(()=>{diffBox.textContent="(failed to load diff)";});});
  const actions=el("div",{class:"actions"},[viewLink,el("span",{class:"grow"})]);
  if(blocked){actions.appendChild(el("span",{class:"badge b-blocked",text:"blocked"}));}
  else{actions.appendChild(hint);}
  const rej=el("button",{class:"btn ghostred",text:"Reject"});
  rej.addEventListener("click",()=>reviewAction(r.id,"reject",d,rej));
  actions.appendChild(rej);
  if(!blocked){okBtn.addEventListener("click",()=>reviewAction(r.id,"approve",d,okBtn));actions.appendChild(okBtn);}
  d.appendChild(el("div",{class:"drow"},[el("div",{class:"ic",text:"🤖"}),
    el("div",{class:"dbody"},[
      el("div",{class:"dtitle",text:(r.role||"agent")+" — "+(r.summary?r.summary.slice(0,90):(r.branch||r.id))}),
      el("div",{class:"dsub",text:r.summary&&r.summary.length>90?r.summary:""}),
      chips,actions,diffWrap])]));
  return d;
}
function pairingCard(p){
  const d=el("div",{class:"decision"});
  const acc=el("button",{class:"btn primary",text:"Accept"}),ig=el("button",{class:"btn ghostred",text:"Ignore"});
  acc.addEventListener("click",()=>accept(p.id,acc,d));
  ig.addEventListener("click",()=>{d.classList.add("gone");});  // local dismiss only (no server unpair here)
  d.appendChild(el("div",{class:"drow"},[el("div",{class:"ic pair",text:"🔗"}),
    el("div",{class:"dbody"},[
      el("div",{class:"dtitle",text:(p.name||"A machine")+" wants to connect"}),
      el("div",{class:"dsub",text:"Only accept if you recognise it — verify the code with them out-of-band first."+(p.time?(" First seen "+p.time+"."):"")}),
      el("div",{class:"did",text:p.id}),
      el("div",{class:"actions"},[el("span",{class:"grow"}),ig,acc])])]));
  return d;
}
function threadCard(t){
  const who=t.from_identity||t.from||"someone";const st=t.status||"note";
  const d=el("div",{class:"decision info"});
  d.appendChild(el("div",{class:"drow"},[el("div",{class:"ic reply",text:"💬"}),
    el("div",{class:"dbody"},[
      el("div",{class:"dtitle",text:t.title}),
      el("div",{class:"dsub",text:"from "+who+" · "+t.age+(t.attach_count?(" · "+t.attach_count+" attached"):"")+" — reply from your terminal with /codesync-thread-reply"})]),
    el("span",{class:"badge b-"+(["todo","wip","blocked","note","done"].includes(st)?st:"note"),text:plainStatus(st)})]));
  return d;
}
function conflictCard(c){
  const d=el("div",{class:"decision info"});
  d.appendChild(el("div",{class:"drow"},[el("div",{class:"ic conflict",text:"⚠"}),
    el("div",{class:"dbody"},[
      el("div",{class:"dtitle",text:"Sync conflict: "+c.name}),
      el("div",{class:"dsub"},[el("span",{class:"mono",text:c.rel}),document.createTextNode(" · "+c.age+" — open both, merge by hand, delete the .sync-conflict- copy")])])]));
  return d;
}
// Signature of the queue's IDENTITY (not volatile fields like age). The 4s poll
// fires several fetches that each call renderNeedsYou(); rebuilding every time
// would wipe transient UI state — e.g. an open diff. So only rebuild when an
// item is actually added/removed or its status changes; otherwise leave the DOM
// (and your open diff) alone.
let _nySig=null;
function nySig(){
  return JSON.stringify([
    NY.pending.map(p=>p.id),
    NY.reviews.map(r=>r.id+":"+r.status),
    NY.waiting.map(t=>(t.title||"")+":"+(t.role||"")+":"+(t.status||"")),
    NY.conflicts.map(c=>c.rel),
  ]);
}
function renderNeedsYou(){
  const box=document.getElementById("needs");
  const sig=nySig();
  if(sig===_nySig && box.dataset.built==="1") return;   // unchanged → keep the DOM (preserves an open diff)
  _nySig=sig; box.dataset.built="1";
  clear(box);
  const total=NY.pending.length+NY.reviews.length+NY.waiting.length+NY.conflicts.length;
  const c=document.getElementById("c-need");c.style.display=total?"":"none";c.textContent=total;
  if(!total){box.appendChild(el("div",{class:"calm"},[
    el("div",{class:"big",text:"You're all caught up ✓"}),
    el("div",{class:"small",text:"Nothing needs your decision in this project right now."})]));return;}
  NY.pending.forEach(p=>box.appendChild(pairingCard(p)));
  NY.reviews.forEach(r=>box.appendChild(reviewCard(r)));
  NY.waiting.forEach(t=>box.appendChild(threadCard(t)));
  NY.conflicts.forEach(cf=>box.appendChild(conflictCard(cf)));
}
function reviewAction(id,action,card,btn){
  btn.disabled=true;btn.textContent=action==="approve"?"Approving…":"Rejecting…";
  post("/api/review-action",{project:CURRENT,id:id,action:action}).then(({body})=>{
    if(body.ok){card.classList.add("gone");NY.reviews=NY.reviews.filter(r=>r.id!==id);setTimeout(renderGlance,300);refresh();}
    else{btn.disabled=false;btn.textContent=action==="approve"?"Approve ▸":"Reject";
      card.appendChild(el("div",{class:"err",text:body.error||body.message||"action failed"}));}
  }).catch(()=>{btn.disabled=false;btn.textContent=action==="approve"?"Approve ▸":"Reject";});
}
function accept(id,btn,card){
  btn.disabled=true;btn.textContent="Accepting…";
  post("/api/accept-pairing",{device_id:id}).then(({body})=>{
    if(body.ok){if(card)card.classList.add("gone");refresh();}
    else{btn.disabled=false;btn.textContent="Retry";card.appendChild(el("div",{class:"err",text:body.error||body.message||"failed"}));}
  }).catch(()=>{btn.disabled=false;btn.textContent="Retry";});
}

// ── HAPPENING ──
const FEED_KIND={active:["active","🟣"],archived:["archived","✓"],noticed:["noticed","👀"],autopilot:["auto-reply","🤖"]};
function renderHappening(){
  const box=document.getElementById("happening");clear(box);
  const working=HAP.sessions.length;
  const live=el("div",{class:"live"});
  live.appendChild(el("span",{class:"pulse"+(working?"":" idle")}));
  const liveText=el("div");
  if(working){
    liveText.appendChild(el("b",{text:HAP.sessions.map(s=>s.role).join(", ")}));
    liveText.appendChild(document.createTextNode(" working now"));
  } else liveText.appendChild(document.createTextNode("No agents running right now"));
  live.appendChild(liveText);
  if(working){
    const stopAll=el("button",{class:"btn",style:"margin-left:auto;font-size:12px;padding:5px 11px",text:HAP.sessions.length===1?"Stop":"Stop all"});
    stopAll.addEventListener("click",()=>HAP.sessions.forEach(s=>post("/api/stop-session",{project:CURRENT,pid:s.pid}).then(refresh)));
    live.appendChild(stopAll);
  }
  box.appendChild(live);
  if(!HAP.feed.length){box.appendChild(el("div",{class:"ev"},[document.createTextNode("Nothing yet — activity fills in as threads arrive, agents work, and syncs happen.")]));return;}
  HAP.feed.slice(0,12).forEach(e=>{
    const k=FEED_KIND[e.kind]||["event","•"];
    const sub=[e.role?("→"+e.role):"",e.from?("from "+e.from):""].filter(Boolean).join(" · ");
    box.appendChild(el("div",{class:"ev"},[
      el("span",{class:"gi",text:k[1]}),
      el("div",{},[el("b",{text:e.title||e.slug||k[0]}),sub?document.createTextNode(" · "+sub):null]),
      el("span",{class:"t",text:e.age||""})]));
  });
}

// ── HEALTH ──
function renderHealth(){
  const f=HLT.folder||{},peers=HLT.peers||[];
  const dot=document.getElementById("h-dot"),line=document.getElementById("h-line");
  const synced=HLT.sync_ok&&!(f.need_files>0);
  dot.className="dot "+(HLT.sync_ok===false?"bad":(synced?"ok":"warn"));
  const ap=HLT.autopilot||{},m=HLT.metrics||{};
  line.textContent=[
    HLT.sync_ok===false?"Syncthing offline":(synced?"Everyone in sync":(f.need_files+" file(s) syncing")),
    (peers.length?peers.filter(p=>p.connected).length+"/"+peers.length+" peer(s) online":"no peers"),
    "auto-replies "+(ap.enabled?"on":"off"),
    (m.ttn_median_seconds!=null?("noticed ~"+fmtSecs(m.ttn_median_seconds)):"")
  ].filter(Boolean).join(" · ");
  if(!HEALTH_OPEN)return;
  const body=document.getElementById("health-body");clear(body);
  // who's connected
  const who=el("div");
  const selfSub=el("div",{class:"sub"},[el("span",{class:"mono",text:(OVERVIEW.device_id||"").slice(0,7)+"…"})]);
  projRoles(CURRENT).forEach(r=>selfSub.appendChild(el("span",{class:"role"+(LIVE_ROLES.has(r)?" active":""),text:r})));
  who.appendChild(el("div",{class:"agent self"},[el("div",{class:"av",text:initials(OVERVIEW.identity||"me")}),
    el("div",{class:"main"},[el("div",{class:"nm",text:OVERVIEW.identity||"this machine"}),selfSub]),
    el("span",{class:"pill you",text:"this machine"})]));
  if(HLT.sync_ok===false)who.appendChild(el("div",{class:"hsub",text:"Syncthing offline — peers can't be listed."}));
  else if(!peers.length)who.appendChild(el("div",{class:"hsub",text:"No other machines paired yet — pair one with /codesync-pair."}));
  else peers.forEach(p=>who.appendChild(el("div",{class:"agent"},[el("div",{class:"av",text:initials(p.name)}),
    el("div",{class:"main"},[el("div",{class:"nm",text:p.name}),el("div",{class:"sub"},[el("span",{class:"mono",text:p.id_short+"…"}),document.createTextNode(p.connected&&p.address?("  "+p.address):"")])]),
    el("span",{class:"pill "+(p.connected?"on":"off"),text:p.connected?"connected":"offline"})])));
  // stat grid
  const grid=el("div",{class:"hgrid",style:"margin-top:14px"});
  const cell=(k,v)=>el("div",{class:"hcell"},[el("div",{class:"k",text:k}),el("div",{class:"v",text:v})]);
  grid.appendChild(cell("Sync",HLT.sync_ok===false?"Offline":(f.need_files>0?(f.need_files+" to sync"):"Up to date")));
  grid.appendChild(cell("Connected",peers.length?(peers.filter(p=>p.connected).length+" online"):"no peers"));
  grid.appendChild(cell("Auto-replies",ap.enabled?("On · "+(ap.runs_last_hour||0)+"/hr"):"Off"));
  grid.appendChild(cell("Time to notice",m.ttn_median_seconds!=null?fmtSecs(m.ttn_median_seconds):"—"));
  grid.appendChild(cell("Open threads",m.open!=null?String(m.open):"—"));
  grid.appendChild(cell("Done",m.done!=null?String(m.done):"—"));
  body.appendChild(who);body.appendChild(grid);
}

// ── DO (launch / create) ──
let _launchFor="";
function launchInto(role,into,cap){
  clear(into);into.appendChild(el("span",{class:"hint",text:"launching…"}));
  post("/api/launch-agent",{project:CURRENT,role:role,capability:cap||""}).then(({body})=>{clear(into);
    if(body.launched)into.appendChild(el("span",{class:"pill on",text:"launched ✓"}));
    else if(body.copy){into.appendChild(el("div",{class:"hint",text:"Couldn't auto-open a terminal — run this:"}));
      const cp=el("button",{class:"btn",text:"Copy"});cp.addEventListener("click",()=>navigator.clipboard&&navigator.clipboard.writeText(body.copy).then(()=>cp.textContent="Copied"));
      into.appendChild(el("div",{class:"did",text:body.copy}));into.appendChild(cp);}
    else into.appendChild(el("div",{class:"err",text:body.error||body.message||"launch failed"}));
  }).catch(()=>{clear(into);into.appendChild(el("div",{class:"err",text:"launch failed"}));});
}
function renderDo(){
  if(_launchFor===CURRENT)return;_launchFor=CURRENT;
  const box=document.getElementById("do");clear(box);
  const roles=projRoles(CURRENT);
  const bar=el("div",{class:"dobar"});
  const newRoleBtn=el("button",{class:"btn",text:"＋ New role"});
  const formWrap=el("div",{class:"panel",style:"display:none"});
  newRoleBtn.addEventListener("click",()=>{const open=formWrap.style.display==="none";formWrap.style.display=open?"":"none";if(open)buildRoleForm(formWrap);});
  bar.appendChild(newRoleBtn);box.appendChild(bar);
  if(!roles.length){box.appendChild(el("div",{class:"empty",text:"No roles here yet — create one above."}));box.appendChild(formWrap);return;}
  const sels={};
  const list=el("div",{class:"panel"});
  roles.forEach(r=>{
    const stat=el("div",{style:"display:flex;align-items:center;gap:8px;flex-wrap:wrap;justify-content:flex-end"});
    const sel=el("select",{title:"capability — what tools this agent may use",style:"margin-left:auto;padding:5px 8px;border-radius:8px;background:var(--card);color:var(--text);border:1px solid var(--border)"});
    sel.appendChild(el("option",{value:"",text:"unrestricted"}));sels[r]=sel;
    const btn=el("button",{class:"btn",text:"Launch"});btn.addEventListener("click",()=>launchInto(r,stat,sel.value));
    list.appendChild(el("div",{class:"agent"},[el("div",{class:"av",text:initials(r)}),
      el("div",{class:"main"},[el("div",{class:"nm",text:r}),el("div",{class:"sub",text:"open a terminal as "+r})]),sel,stat,btn]));
  });
  box.appendChild(list);box.appendChild(formWrap);
  api("/api/launch-options?project="+encodeURIComponent(CURRENT)).then(o=>{
    (o.presets||[]).forEach(p=>Object.values(sels).forEach(sel=>sel.appendChild(el("option",{value:p.key,text:p.key}))));
    const seeded=o.seeded||{};Object.keys(seeded).forEach(r=>{if(sels[r])sels[r].value=seeded[r];});}).catch(()=>{});
}
function buildRoleForm(wrap){
  if(wrap.dataset.built)return;wrap.dataset.built="1";
  const name=el("input",{type:"text",placeholder:"role name (e.g. data-eng — lowercase, dashes)",class:"fin"});
  const cat=el("select",{class:"fin"});cat.appendChild(el("option",{value:"",text:"start from a catalog role… (optional)"}));
  const owns=el("textarea",{placeholder:"Owns — one per line",rows:"3",class:"fin"});
  const notowns=el("textarea",{placeholder:"Does not own — one per line",rows:"2",class:"fin"});
  const go=el("button",{class:"btn primary",text:"Create + launch"});const msg=el("div",{style:"margin-top:8px"});
  api("/api/roles").then(c=>(c.categories||[]).forEach(g=>(g.roles||[]).forEach(r=>{const o=el("option",{value:r.name,text:g.name+" · "+(r.display||r.name)});o._r=r;cat.appendChild(o);}))).catch(()=>{});
  cat.addEventListener("change",()=>{const o=cat.selectedOptions[0];if(o&&o._r){if(!name.value)name.value=o._r.name;owns.value=(o._r.owns||[]).join("\n");notowns.value=(o._r.does_not_own||[]).join("\n");}});
  go.addEventListener("click",()=>submitRole(name,owns,notowns,msg,go,false));
  [name,cat,owns,notowns,go,msg].forEach(n=>wrap.appendChild(n));
}
function submitRole(name,owns,notowns,msg,go,confirm){
  const role=(name.value||"").trim().toLowerCase().replace(/[^a-z0-9_-]+/g,"-").replace(/^-+|-+$/g,"");name.value=role;
  const ow=owns.value.split("\n").map(s=>s.trim()).filter(Boolean),no=notowns.value.split("\n").map(s=>s.trim()).filter(Boolean);
  clear(msg);if(!role){msg.appendChild(el("div",{class:"err",text:"Enter a role name — lowercase letters, digits, dashes."}));return;}
  go.disabled=true;go.textContent="Creating…";
  post("/api/create-role",{project:CURRENT,role:role,owns:ow,not_owns:no,confirm:confirm}).then(({body})=>{
    go.disabled=false;go.textContent="Create + launch";clear(msg);
    if(body.created){const into=el("div",{style:"margin-top:8px"});msg.appendChild(el("div",{class:"hint",text:'Role "'+role+'" created. Launching…'}));msg.appendChild(into);launchInto(role,into);return;}
    if(body.needs_confirm){const tk=(body.overlaps||[]).map(o=>o.role+" ("+(o.shared||[]).join(", ")+")").join("; ");
      msg.appendChild(el("div",{class:"hint",text:"Owns overlaps: "+tk+". Use /codesync-role-new for a full review, or:"}));
      const a=el("button",{class:"btn",text:"Create anyway"});a.addEventListener("click",()=>submitRole(name,owns,notowns,msg,go,true));msg.appendChild(a);return;}
    msg.appendChild(el("div",{class:"err",text:body.error||body.message||"create failed"}));
  }).catch(()=>{go.disabled=false;go.textContent="Create + launch";msg.appendChild(el("div",{class:"err",text:"create failed"}));});
}

// ── poll loop ──
function refresh(){
  api("/api/overview").then(o=>{OVERVIEW=o;if(VIEW==="list")renderProjects(o);renderGlance();}).catch(()=>{});
  if(VIEW==="detail"&&CURRENT){
    const q="?project="+encodeURIComponent(CURRENT);
    api("/api/pending").then(d=>{NY.pending=d.pending||[];renderNeedsYou();renderGlance();}).catch(()=>{});
    api("/api/threads"+q).then(d=>{NY.waiting=(d.threads||[]).filter(t=>t.status!=="done");renderNeedsYou();renderGlance();}).catch(()=>{});
    api("/api/reviews"+q).then(d=>{NY.reviews=(d.reviews||[]).filter(r=>r.status==="pending"||r.status==="blocked");renderNeedsYou();renderGlance();}).catch(()=>{});
    api("/api/sessions"+q).then(d=>{HAP.sessions=d.sessions||[];LIVE_ROLES=new Set(HAP.sessions.map(s=>s.role));renderHappening();renderHealth();renderGlance();}).catch(()=>{});
    api("/api/peers"+q).then(d=>{HLT.peers=d.peers||[];HLT.folder=d.folder||{};HLT.sync_ok=d.syncthing_ok;renderHealth();renderGlance();}).catch(()=>{});
    api("/api/activity"+q).then(d=>{NY.conflicts=d.conflicts||[];HAP.feed=d.feed||[];HLT.autopilot=d.autopilot||{};HLT.metrics=d.metrics||{};
      renderNeedsYou();renderHappening();renderHealth();renderGlance();}).catch(()=>{});
    renderDo();
  } else { api("/api/pending").then(d=>{NY.pending=d.pending||[];}).catch(()=>{}); }
  renderGlance();
}
refresh();setInterval(refresh,4000);
</script>
